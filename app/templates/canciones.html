<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Canciones</title>
</head>
<body>
    <h1>Lista de Canciones</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Artista</th>
                <th>Género</th>
                <th>Precio</th>
                <th>Duración</th>
                <th>Fecha de Lanzamiento</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for cancion in canciones %}
            <tr>
                <td>{{ cancion[0] }}</td>
                <td>{{ cancion[1] }}</td>
                <td>{{ cancion[2] }}</td>
                <td>{{ cancion[3] }}</td>
                <td>{{ cancion[4] }}</td>
                <td>{{ cancion[5] }}</td>
                <td>{{ cancion[6] }}</td>
                <td>
                    <a href="{{ url_for('editar_cancion', id=cancion['idCan']) }}">Editar</a>
                    <form method="POST" action="{{ url_for('eliminar_cancion', id=cancion['idCan']) }}" style="display: inline;">
                        <input type="hidden" name="_method" value="DELETE">
                        <input type="submit" value="Eliminar">
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('crear_cancion') }}">Agregar Nueva Canción</a>
</body>
</html>
