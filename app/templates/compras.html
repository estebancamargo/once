<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Compras</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>Lista de Compras</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Fecha de Compra</th>
                <th>Precio</th>
                <th>Usuario</th>
                <th>Canción</th>
                <th>Método de Pago</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for compra in compras %}
            <tr>
                <td>{{ compra[0] }}</td>
                <td>{{ compra[1] }}</td>
                <td>{{ compra[2] }}</td>
                <td>{{ compra[3] }}</td>
                <td>{{ compra[4] }}</td>
                <td>{{ compra[5] }}</td>
                <td>
                    <a href="{{ url_for('editar_compra', id=compra[id_compra]) }}">Editar</a>
                    <form method="POST" action="{{ url_for('eliminar_compra', id=compra[id_compra]) }}" style="display: inline;">
                        <input type="hidden" name="_method" value="DELETE">
                        <input type="submit" value="Eliminar">
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('crear_compra') }}">Agregar Nueva Compra</a>
</body>
</html>
